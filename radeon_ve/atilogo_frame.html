<SCRIPT LANGUAGE=javascript>
var Cult3Dslave;
var msgslave;


function initslaveCult()
{

		Cult3Dslave=new Cult3D_Object("slave");
	
}	
	
function slavetriggermessage()
{
	var success= Cult3Dslave.triggerEvent(parent.left.msgmaster);
	if (!success)
		alert("Error couldnt find the event "+parent.left.msgmaster);
		
		
}
function SlaveReceivedMsg()
	{
			
	msgslave = Cult3Dslave.getLastMessage();

		var success = parent.left.Cult3Dmaster.triggerEvent(msgslave);
	if (!success)
		alert("Error couldnt find the Event ");
			
}
</script>
<SCRIPT LANGUAGE=javascript FOR=slave EVENT=OnSceneLoaded>

if (isIE())
{
	initslaveCult();
}

</SCRIPT>
<SCRIPT LANGUAGE=javascript FOR=slave EVENT=onsendmessage>

if (isIE())
{
	SlaveReceivedMsg();
}

</SCRIPT>
